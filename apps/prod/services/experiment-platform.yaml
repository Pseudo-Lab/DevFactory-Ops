apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: experiment-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Pseudo-Lab/DevFactory-Ops.git
    targetRevision: main
    path: services/experiment-platform-pseudolab/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: experiment-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: experiment-platform-backend
      namespace: experiment-platform
      jsonPointers:
        - /spec/template/metadata/annotations/reloader.stakater.com~1last-reloaded-from
