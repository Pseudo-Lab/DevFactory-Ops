apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-bingo-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-bingo
      component: frontend
  template:
    metadata:
      labels:
        app: event-bingo
        component: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: frontend
          image: ghcr.io/pseudo-lab/event-bingo-frontend
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
