apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-bingo-backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: event-bingo
      component: backend
  template:
    metadata:
      labels:
        app: event-bingo
        component: backend
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      initContainers:
        - name: migrate
          image: ghcr.io/pseudo-lab/event-bingo-backend
          imagePullPolicy: Always
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: event-bingo-backend-runtime-secrets
      containers:
        - name: event-bingo-backend
          image: ghcr.io/pseudo-lab/event-bingo-backend
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: event-bingo-backend-runtime-secrets
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
