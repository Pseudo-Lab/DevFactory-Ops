---
# Replace this scaffold with values sealed for the target cluster before first rollout.
# Example:
# kubectl create secret generic event-bingo-runtime-secrets \
#   --namespace event-bingo \
#   --from-literal=DB_URL='postgresql://...' \
#   --from-literal=SWAGGER_USERNAME='...' \
#   --from-literal=SWAGGER_PASSWORD='...' \
#   --dry-run=client -o yaml | \
#   kubeseal --controller-name=sealed-secrets --format yaml \
#   > services/event-bingo/overlays/prod/sealed-secret.yaml
# Optional keys supported by the app:
# ENV, ADMIN_JWT_SECRET, ADMIN_INVITE_URL_BASE, ADMIN_INVITE_TOKEN_EXPIRE_HOURS,
# ADMIN_SMTP_HOST, ADMIN_SMTP_PORT, ADMIN_SMTP_USERNAME, ADMIN_SMTP_PASSWORD,
# ADMIN_SMTP_FROM_EMAIL, ADMIN_SMTP_FROM_NAME, ADMIN_SMTP_USE_TLS, ADMIN_SMTP_USE_SSL
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: event-bingo-runtime-secrets
  namespace: event-bingo
spec:
  encryptedData: {}
  template:
    metadata:
      name: event-bingo-runtime-secrets
      namespace: event-bingo
    type: Opaque
