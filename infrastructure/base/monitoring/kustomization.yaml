apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - victoria-metrics/grafana-admin-sealed-secret.yaml
  - victoria-metrics/alertmanager-config-sealed-secret.yaml

helmCharts:
  - name: loki
    repo: https://grafana.github.io/helm-charts
    version: 6.55.0
    releaseName: loki
    namespace: monitoring
    valuesFile: loki/values.yaml
  - name: promtail
    repo: https://grafana.github.io/helm-charts
    version: 6.16.6
    releaseName: promtail
    namespace: monitoring
    valuesFile: loki/promtail-values.yaml
