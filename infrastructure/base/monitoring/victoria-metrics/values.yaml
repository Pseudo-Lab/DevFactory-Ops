# Optimized VictoriaMetrics k8s stack for single-node A1 (ARM64)
fullnameOverride: vm

# Enable Alertmanager with custom config secret
alertmanager:
  enabled: true
  spec:
    configSecret: alertmanager-config
    resources:
      limits:
        cpu: 200m
        memory: 256Mi

# vmalert uses alertmanager for notifying
vmalert:
  enabled: true
  spec:
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
    # No longer blackhole, it will now talk to alertmanager

# Grafana is included in the stack, but we can also use it separately.
# For now, let's keep it in the stack for easier integration.
grafana:
  enabled: true
  datasourceConfigMaps:
    - grafana-loki-datasource
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    hosts:
      - grafana.pseudolab-devfactory.com
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.pseudolab-devfactory.com
  admin:
    existingSecret: grafana-admin-creds
    userKey: admin-user
    passwordKey: admin-password
  extraSecretMounts:
    - name: bingo-creds
      mountPath: /etc/grafana/secrets/bingo
      secretName: grafana-bingo-creds
      readOnly: true
  lifecycle:
    postStart:
      exec:
        command:
          - /bin/bash
          - -c
          - |
            until curl -s http://localhost:3000/api/health; do sleep 5; done;
            BINGO_USER=$(cat /etc/grafana/secrets/bingo/user)
            BINGO_PASS=$(cat /etc/grafana/secrets/bingo/password)
            ADMIN_PASS=$(cat /etc/grafana/admin-password)
            curl -X POST -H "Content-Type: application/json" \
              -d "{\"name\":\"Bingo Developer\", \"email\":\"bingo-dev@pseudolab.local\", \"login\":\"$BINGO_USER\", \"password\":\"$BINGO_PASS\"}" \
              http://admin:$ADMIN_PASS@localhost:3000/api/admin/users

# VictoriaMetrics Single node (cheaper than cluster version)
vmsingle:
  enabled: true
  spec:
    replicaCount: 1
    resources:
      limits:
        cpu: 500m
        memory: 1024Mi
      requests:
        cpu: 100m
        memory: 512Mi
    retentionPeriod: "180d"

# Scrape configurations
vmagent:
  enabled: true
  spec:
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
    remoteWrite:
      - url: "http://vmsingle-vm.monitoring.svc:8428/api/v1/write"

# Component configurations
kubeStateMetrics:
  enabled: true

prometheus-node-exporter:
  enabled: true
  resources:
    limits:
      cpu: 250m
      memory: 128Mi

# k3s specific: These components are internal or bind to localhost, causing 'Down' alerts.
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false

kubelet:
  enabled: true
  serviceMonitor:
    https: true # k3s kubelet uses https on 10250

# Cleanup hook configuration to fix non-existent rancher/kubectl:v1.32 image issue
victoria-metrics-operator:
  cleanup:
    image:
      tag: v1.31.1
