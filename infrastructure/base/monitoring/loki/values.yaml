# Loki k8s stack for single-node A1 (ARM64)
deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  resources:
    limits:
      cpu: 250m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  persistence:
    enabled: true
    size: 50Gi
    storageClass: local-path

# Loki chart v6.x: explicitly zero SimpleScalable targets so the
# chart's validate.yaml accepts SingleBinary-only deployment.
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable auxiliary components not needed on single-node ARM64
chunksCache:
  enabled: false
resultsCache:
  enabled: false
gateway:
  enabled: false
lokiCanary:
  enabled: false
test:
  enabled: false

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  # Loki chart v6.x: storage type and bucketNames required even for filesystem
  storage:
    type: filesystem
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin

  limits_config:
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    retention_period: 4320h  # 180 days
    max_cache_freshness_per_query: 10m
    max_streams_per_user: 10000

  # Chart v6.x expects camelCase schemaConfig (validate.yaml checks this key)
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

